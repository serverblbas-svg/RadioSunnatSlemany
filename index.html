<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Editor - KAMAL PRO ULTRA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* Top Bar - Weather & Clock */
        .top-bar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            box-shadow: 0 5px 30px rgba(0,0,0,0.5);
        }

        .top-bar::before {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #da251d, #ffd700, #009639, #ffd700, #da251d);
            background-size: 200% auto;
            animation: borderGlow 3s linear infinite;
        }

        @keyframes borderGlow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* Weather Section */
        .weather-section {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px 20px;
            text-align: center;
            min-width: 140px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .weather-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #da251d, #ffd700, #009639);
            opacity: 0.6;
        }

        .weather-city {
            font-size: 0.9em;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            margin-bottom: 5px;
        }

        .weather-icon {
            font-size: 2em;
            margin: 5px 0;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.3));
        }

        .weather-temp {
            font-size: 1.8em;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.4);
        }

        .weather-desc {
            font-size: 0.75em;
            color: rgba(255,255,255,0.5);
            margin-top: 3px;
        }

        /* Clock & Date Section */
        .clock-section {
            text-align: left;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .mega-clock {
            font-size: 3em;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            line-height: 1;
        }

        .date-line {
            font-size: 1em;
            color: rgba(255,255,255,0.7);
            font-weight: 600;
        }

        .date-line .highlight {
            color: #ffd700;
            font-weight: 900;
        }

        /* Main Content */
        .main-content {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Video Player Area */
        .player-area {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            margin-top: 20px;
            min-height: 500px;
            position: relative;
            overflow: hidden;
        }

        .player-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #da251d, #ffd700, #009639);
            opacity: 0.7;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .player-title {
            font-size: 1.5em;
            font-weight: 900;
            background: linear-gradient(to right, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: linear-gradient(135deg, #da251d, #ffd700);
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.9em;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            color: rgba(255,255,255,0.6);
        }

        .status-item .value {
            color: #ffd700;
            font-weight: 900;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .top-bar {
                flex-direction: column;
                gap: 20px;
            }
            .weather-section {
                justify-content: center;
            }
            .clock-section {
                align-items: center;
            }
            .mega-clock {
                font-size: 2.2em;
            }
        }

        @media (max-width: 600px) {
            .weather-card {
                min-width: 100px;
                padding: 10px;
            }
            .mega-clock {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>

    <!-- Top Bar: Weather + Clock -->
    <div class="top-bar">
        <div class="weather-section" id="weatherSection">
            <div class="weather-card" data-city="hawler">
                <div class="weather-city">هەولێر</div>
                <div class="weather-icon" id="hawler-icon">⛅</div>
                <div class="weather-temp" id="hawler-temp">--°</div>
                <div class="weather-desc" id="hawler-desc">...</div>
            </div>
            <div class="weather-card" data-city="slemani">
                <div class="weather-city">سلێمانی</div>
                <div class="weather-icon" id="slemani-icon">⛅</div>
                <div class="weather-temp" id="slemani-temp">--°</div>
                <div class="weather-desc" id="slemani-desc">...</div>
            </div>
            <div class="weather-card" data-city="duhok">
                <div class="weather-city">دهۆک</div>
                <div class="weather-icon" id="duhok-icon">⛅</div>
                <div class="weather-temp" id="duhok-temp">--°</div>
                <div class="weather-desc" id="duhok-desc">...</div>
            </div>
            <div class="weather-card" data-city="kirkuk">
                <div class="weather-city">کەرکووک</div>
                <div class="weather-icon" id="kirkuk-icon">⛅</div>
                <div class="weather-temp" id="kirkuk-temp">--°</div>
                <div class="weather-desc" id="kirkuk-desc">...</div>
            </div>
            <div class="weather-card" data-city="halabja">
                <div class="weather-city">هەڵەبجە</div>
                <div class="weather-icon" id="halabja-icon">⛅</div>
                <div class="weather-temp" id="halabja-temp">--°</div>
                <div class="weather-desc" id="halabja-desc">...</div>
            </div>
        </div>

        <div class="clock-section">
            <div class="mega-clock" id="megaClock">00:00:00</div>
            <div class="date-line" id="gregorianDate">...</div>
            <div class="date-line" id="kurdishDate">...</div>
            <div class="date-line" id="hijriDate">...</div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="player-area">
            <div class="player-header">
                <div class="player-title">📻 Radio Spi Hawler - ڕادیۆی سپی هەولێر</div>
                <div class="badge">LIVE</div>
            </div>
            
            <!-- Audio Player -->
            <audio id="audioPlayer" controls style="width: 100%; margin-top: 20px; opacity: 0.8;">
                <source src="https://media2.streambrothers.com:1936/8218/8218/chunklist_w1622172701.m3u8" type="application/x-mpegURL">
            </audio>

            <div class="status-bar">
                <div class="status-item">
                    <span>📡</span>
                    <span>Status: <span class="value" id="streamStatus">Ready</span></span>
                </div>
                <div class="status-item">
                    <span>🎵</span>
                    <span>Volume: <span class="value" id="volDisplay">80%</span></span>
                </div>
                <div class="status-item">
                    <span>📊</span>
                    <span>Channels: <span class="value">2545</span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Kurdish Calendar Data
        const kurdishMonths = ['خاکەلێوە', 'گوڵان', 'جۆزەردان', 'پووشپەڕ', 'گەلاوێژ', 'خەرمانان', 'ڕەزبەر', 'گەڵاڕێزان', 'سەرەوە', 'بەفرانبار', 'ڕێبەندان', 'ڕەشەمێ'];
        const kurdishDays = ['یەکشەممە', 'دووشەممە', 'سێشەممە', 'چوارشەممە', 'پێنجشەممە', 'هەینی', 'شەممە'];
        const hijriMonths = ['محرم', 'صفر', 'ربيع الأول', 'ربيع الثاني', 'جمادى الأولى', 'جمادى الآخرة', 'رجب', 'شعبان', 'رمضان', 'شوال', 'ذو القعدة', 'ذو الحجة'];

        // Weather Icons mapping
        const weatherIcons = {
            0: '☀️', 1: '🌤', 2: '⛅', 3: '☁️', 45: '🌫', 48: '🌫',
            51: '🌦', 53: '🌧', 55: '🌧', 61: '🌧', 63: '🌧', 65: '🌧',
            71: '🌨', 73: '🌨', 75: '🌨', 80: '🌧', 81: '🌧', 82: '🌧',
            95: '⛈', 96: '⛈', 99: '⛈'
        };

        const weatherDescs = {
            0: 'ئاسمان ڕۆشن', 1: 'سەرەکی ڕۆشن', 2: 'هەندێک هەور', 3: 'هەورە',
            45: 'تەڕە', 48: 'تەڕە', 51: 'بارانێکی کەم', 53: 'باران', 55: 'بارانی زۆر',
            61: 'بارانێکی کەم', 63: 'باران', 65: 'بارانی زۆر', 71: 'بەفر', 73: 'بەفر', 75: 'بەفر',
            80: 'باران', 81: 'باران', 82: 'بارانی زۆر', 95: 'هەورەگرمە', 96: 'هەورەگرمە', 99: 'هەورەگرمە'
        };

        // Hijri conversion (approximate)
        function toHijri(date) {
            const jd = Math.floor((1461 * (date.getFullYear() + 4800 + Math.floor((date.getMonth() - 14) / 12))) / 4) +
                Math.floor((367 * (date.getMonth() - 2 - 12 * Math.floor((date.getMonth() - 14) / 12))) / 12) -
                Math.floor((3 * Math.floor((date.getFullYear() + 4900 + Math.floor((date.getMonth() - 14) / 12)) / 100)) / 4) +
                date.getDate() - 32075;
            const l = jd - 1948440 + 10632;
            const n = Math.floor((l - 1) / 10631);
            const j = l - 10631 * n + 354;
            const jy = Math.floor((j + 1) / 10631) + 1;
            const jp = j - 29 - 11 * jy;
            const jm = Math.floor((jp + 1) / 30) + 1;
            const jd2 = jp - 30 * (jm - 1) + jy;
            const year = Math.floor((11 * n + 3) / 30) + 1 + 1;
            const month = jm - 1;
            const day = jd2;
            return { day, month: hijriMonths[month], year };
        }

        // Update Clock & Dates
        function updateDateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');

            // Clock
            document.getElementById('megaClock').textContent = `${h}:${m}:${s}`;

            // Gregorian
            const gregDay = now.getDate();
            const gregMonth = now.toLocaleDateString('ku-TR', { month: 'long' });
            const gregYear = now.getFullYear();
            document.getElementById('gregorianDate').innerHTML = 
                `<span class="highlight">${gregDay}</span>ی ${gregMonth}ی ${gregYear}`;

            // Kurdish (KRG)
            const kurdYear = gregYear + 700;
            const kurdDay = kurdishDays[now.getDay()];
            const kurdMonth = kurdishMonths[now.getMonth()];
            document.getElementById('kurdishDate').innerHTML = 
                `${kurdDay} | <span class="highlight">${now.getDate()}</span>ی ${kurdMonth}ی ${kurdYear}`;

            // Hijri
            const hijri = toHijri(now);
            document.getElementById('hijriDate').innerHTML = 
                `<span class="highlight">${hijri.day}</span>ی ${hijri.month}ی ${hijri.year}ی هەتاوی`;
        }

        // Fetch Weather
        async function fetchWeather(lat, lon, cityId) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                const w = data.current_weather;

                document.getElementById(`${cityId}-temp`).textContent = `${Math.round(w.temperature)}°C`;
                document.getElementById(`${cityId}-icon`).textContent = weatherIcons[w.weathercode] || '🌡';
                document.getElementById(`${cityId}-desc`).textContent = weatherDescs[w.weathercode] || '---';
            } catch (e) {
                document.getElementById(`${cityId}-temp`).textContent = '--°';
                document.getElementById(`${cityId}-desc`).textContent = 'نەتوانرا';
            }
        }

        // Update all weather
        function updateAllWeather() {
            fetchWeather(36.1911, 44.0092, 'hawler');    // Erbil
            fetchWeather(35.5575, 45.4350, 'slemani');   // Sulaymaniyah
            fetchWeather(36.8679, 42.9989, 'duhok');     // Duhok
            fetchWeather(35.4669, 44.3929, 'kirkuk');    // Kirkuk
            fetchWeather(35.1778, 45.9861, 'halabja');   // Halabja
        }

        // Volume display update
        const audio = document.getElementById('audioPlayer');
        audio.addEventListener('volumechange', () => {
            document.getElementById('volDisplay').textContent = Math.round(audio.volume * 100) + '%';
        });

        // Stream status
        audio.addEventListener('play', () => {
            document.getElementById('streamStatus').textContent = '🔴 Playing';
            document.getElementById('streamStatus').style.color = '#ff4444';
        });
        audio.addEventListener('pause', () => {
            document.getElementById('streamStatus').textContent = '⏸ Paused';
            document.getElementById('streamStatus').style.color = '#ffd700';
        });

        // Initialize
        updateDateTime();
        updateAllWeather();
        setInterval(updateDateTime, 1000);      // Clock every second
        setInterval(updateAllWeather, 600000);  // Weather every 10 minutes
    </script>
</body>
</html>
