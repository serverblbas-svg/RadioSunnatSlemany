<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ڕادیۆی سپی هەولێر</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f0b90b;
            --gold-dim: rgba(240,185,11,0.15);
            --gold-glow: rgba(240,185,11,0.35);
            --bg-deep: #080a10;
            --bg-card: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.07);
            --text: #f0f2f8;
            --muted: #6a7080;
            --red: #e74c3c;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            background: var(--bg-deep);
            font-family: 'Noto Naskh Arabic', 'Segoe UI', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* === BACKGROUND === */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        .bg-orb-1 {
            top: -140px; left: 50%;
            transform: translateX(-50%);
            width: 700px; height: 500px;
            background: radial-gradient(ellipse, rgba(240,185,11,0.08) 0%, transparent 70%);
        }
        .bg-orb-2 {
            bottom: -120px; left: 50%;
            transform: translateX(-50%);
            width: 600px; height: 400px;
            background: radial-gradient(ellipse, rgba(240,185,11,0.05) 0%, transparent 70%);
        }

        /* === SHELL === */
        .shell {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 30px 22px;
        }

        /* === HEADER === */
        .header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: auto;
        }
        .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 8px var(--gold-glow);
            flex-shrink: 0;
            animation: dot-idle 2.5s ease-in-out infinite;
        }
        @keyframes dot-idle {
            0%,100% { opacity:1; transform:scale(1); }
            50% { opacity:0.4; transform:scale(0.65); }
        }
        .is-playing .live-dot {
            background: var(--red);
            box-shadow: 0 0 10px rgba(231,76,60,0.7);
            animation: dot-live 1s ease-in-out infinite;
        }
        @keyframes dot-live {
            0%,100% { opacity:1; }
            50% { opacity:0.25; }
        }
        .header-label {
            font-size: 0.72rem;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--muted);
            font-family: 'Segoe UI', sans-serif;
            font-weight: 700;
        }

        /* === DISC (LOGO) === */
        .disc-wrap {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin: auto 0;
        }
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(240,185,11,0.10);
            animation-play-state: paused;
        }
        .ring-1 {
            width: 268px; height: 268px;
            animation: spin-cw 18s linear infinite;
        }
        .ring-1::before {
            content:'';
            position:absolute;
            top:-4px; left:50%;
            transform:translateX(-50%);
            width:8px; height:8px;
            border-radius:50%;
            background:var(--gold);
            box-shadow:0 0 12px var(--gold);
        }
        .ring-2 {
            width:245px; height:245px;
            border-color: rgba(240,185,11,0.05);
            animation: spin-ccw 28s linear infinite;
        }
        @keyframes spin-cw  { to { transform: rotate(360deg);  } }
        @keyframes spin-ccw { to { transform: rotate(-360deg); } }

        .is-playing .ring { animation-play-state: running; }

        .disc {
            width: 210px; height: 210px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            background: #ffffff;
            box-shadow:
                0 0 0 5px rgba(240,185,11,0.08),
                0 0 0 11px rgba(240,185,11,0.04),
                0 24px 64px rgba(0,0,0,0.8),
                0 0 80px rgba(240,185,11,0.07);
            transition: box-shadow 0.7s ease;
        }
        .disc img {
            width: 100%; height: 100%;
            object-fit: contain;
            padding: 12px;
            border-radius: 50%;
            display: block;
        }
        .disc-fallback {
            display:none;
            width:100%; height:100%;
            border-radius:50%;
            background: radial-gradient(circle at 35% 35%, #1a1d2e, #080a10);
            align-items:center;
            justify-content:center;
        }
        .disc-fallback svg { opacity: 0.4; }
        .disc-shine {
            position:absolute; inset:0;
            border-radius:50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 55%, rgba(0,0,0,0.05) 100%);
            pointer-events:none;
        }
        .disc-hole {
            position:absolute;
            top:50%; left:50%;
            transform:translate(-50%,-50%);
            width:20px; height:20px;
            border-radius:50%;
            background:var(--bg-deep);
            border:2px solid rgba(240,185,11,0.18);
            z-index:2;
        }

        .is-playing .disc {
            animation: logo-glow 3s ease-in-out infinite alternate;
        }
        
        @keyframes logo-glow {
            0% {
                box-shadow:
                    0 0 0 5px rgba(240,185,11,0.12),
                    0 0 0 12px rgba(240,185,11,0.05),
                    0 24px 64px rgba(0,0,0,0.8),
                    0 0 60px rgba(240,185,11,0.15);
            }
            100% {
                box-shadow:
                    0 0 0 8px rgba(240,185,11,0.25),
                    0 0 0 20px rgba(240,185,11,0.08),
                    0 24px 64px rgba(0,0,0,0.8),
                    0 0 120px rgba(240,185,11,0.4);
            }
        }

        /* === TRACK INFO === */
        .track-info { text-align:center; width:100%; }
        .track-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
        }
        .track-sub {
            font-size: 0.83rem;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* === EQUALIZER === */
        .eq-wrap {
            display:flex;
            align-items:flex-end;
            justify-content:center;
            gap: 5px;
            height: 36px;
        }
        .eq-bar {
            width: 4px;
            background: linear-gradient(to top, var(--gold), rgba(240,185,11,0.25));
            border-radius: 2px;
            height: 4px;
        }
        .is-playing .eq-bar:nth-child(1) { animation: eq 0.70s 0.00s ease-in-out infinite alternate; }
        .is-playing .eq-bar:nth-child(2) { animation: eq 0.50s 0.12s ease-in-out infinite alternate; }
        .is-playing .eq-bar:nth-child(3) { animation: eq 0.90s 0.04s ease-in-out infinite alternate; }
        .is-playing .eq-bar:nth-child(4) { animation: eq 0.60s 0.22s ease-in-out infinite alternate; }
        .is-playing .eq-bar:nth-child(5) { animation: eq 0.80s 0.16s ease-in-out infinite alternate; }
        .is-playing .eq-bar:nth-child(6) { animation: eq 0.55s 0.32s ease-in-out infinite alternate; }
        .is-playing .eq-bar:nth-child(7) { animation: eq 0.75s 0.08s ease-in-out infinite alternate; }
        @keyframes eq { 0% { height:4px; } 100% { height:34px; } }

        /* === CONTROLS === */
        .controls-row {
            width:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            gap: 22px;
        }
        .side-btn {
            width:48px; height:48px;
            border-radius:50%;
            background:var(--bg-card);
            border:1px solid var(--border);
            color:var(--muted);
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            transition: all 0.2s;
        }
        .side-btn:hover { border-color: rgba(240,185,11,0.25); color: var(--gold); }
        .side-btn:active { transform:scale(0.88); }
        .side-btn.active { color:var(--gold); border-color:rgba(240,185,11,0.35); background:var(--gold-dim); }

        .play-btn {
            width:82px; height:82px;
            border-radius:50%;
            background:var(--gold);
            border:none;
            color:#000;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            box-shadow: 0 8px 32px var(--gold-glow);
            transition: transform 0.2s, box-shadow 0.3s;
            position:relative;
            overflow:hidden;
        }
        .play-btn::after {
            content:'';
            position:absolute; inset:0;
            border-radius:50%;
            background:rgba(255,255,255,0.12);
            opacity:0;
            transition:opacity 0.2s;
        }
        .play-btn:active::after { opacity:1; }
        .play-btn:active { transform:scale(0.91); }
        .is-playing .play-btn {
            animation: btn-breathe 3s ease-in-out infinite;
        }
        @keyframes btn-breathe {
            0%,100% { box-shadow: 0 8px 32px var(--gold-glow), 0 0 0 8px rgba(240,185,11,0.09); }
            50%      { box-shadow: 0 8px 32px var(--gold-glow), 0 0 0 18px rgba(240,185,11,0.04); }
        }

        /* === VOLUME === */
        .volume-row {
            width:100%;
            display:flex;
            align-items:center;
            gap:12px;
            padding: 0 8px;
        }
        .vol-tag {
            font-size:0.65rem;
            color:var(--muted);
            font-family:'Segoe UI',sans-serif;
            letter-spacing:1px;
            width:26px;
            text-align:center;
            font-weight:600;
        }
        input[type=range] {
            -webkit-appearance:none;
            flex:1;
            height:3px;
            background: linear-gradient(to right, var(--gold) var(--vp,80%), rgba(255,255,255,0.1) var(--vp,80%));
            border-radius:2px;
            outline:none;
            cursor:pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance:none;
            width:14px; height:14px;
            border-radius:50%;
            background:var(--gold);
            box-shadow:0 0 8px var(--gold-glow);
        }
        input[type=range]::-moz-range-thumb {
            width:14px; height:14px;
            border-radius:50%;
            background:var(--gold);
            border:none;
        }

        /* === FOOTER === */
        .footer-card {
            width:100%;
            background:var(--bg-card);
            border:1px solid var(--border);
            border-radius:16px;
            padding:13px 18px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:10px;
            margin-top: auto;
        }
        .status-group {
            display:flex;
            flex-direction:column;
            gap:3px;
            flex:1;
            min-width:0;
        }
        .status-key {
            font-size:0.63rem;
            color:var(--muted);
            letter-spacing:1.5px;
            text-transform:uppercase;
            font-family:'Segoe UI',sans-serif;
        }
        .status-val {
            font-size:0.84rem;
            font-weight:600;
            color:var(--gold);
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .badge {
            background:var(--gold-dim);
            border:1px solid rgba(240,185,11,0.22);
            color:var(--gold);
            font-size:0.65rem;
            letter-spacing:1.5px;
            font-family:'Segoe UI',sans-serif;
            font-weight:700;
            padding:5px 11px;
            border-radius:20px;
            flex-shrink:0;
        }
    </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="shell" id="shell">

    <div class="header">
        <div class="live-dot"></div>
        <span class="header-label">Radio Spi Hawler</span>
    </div>

    <div class="disc-wrap">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="disc" id="disc">
            <img id="logo"
                src="https://raw.githubusercontent.com/serverblbas-svg/LOGO/main/photo_2023-08-30_20-43-07.jpg"
                alt="Radio Spi Hawler"
                onerror="this.style.display='none';document.getElementById('disc-fallback').style.display='flex';"
            >
            <div class="disc-fallback" id="disc-fallback">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#f0b90b" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="3"></circle>
                    <line x1="12" y1="2" x2="12" y2="5"></line>
                    <line x1="12" y1="19" x2="12" y2="22"></line>
                    <line x1="2" y1="12" x2="5" y2="12"></line>
                    <line x1="19" y1="12" x2="22" y2="12"></line>
                </svg>
            </div>
            <div class="disc-shine"></div>
            <div class="disc-hole"></div>
        </div>
    </div>

    <div class="track-info">
        <div class="track-name">ڕادیۆی سپی هەولێر</div>
        <div class="track-sub">پەخشی ڕاستەوخۆ</div>
    </div>

    <div class="eq-wrap">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
    </div>

    <div class="controls-row">

        <button class="side-btn" id="muteBtn" onclick="toggleMute()">
            <svg id="ico-sound" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg id="ico-mute" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <line x1="23" y1="9" x2="17" y2="15"></line>
                <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
        </button>

        <button class="play-btn" onclick="togglePlay()">
            <svg id="ico-play" width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg id="ico-pause" width="30" height="30" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                <rect x="6" y="4" width="4" height="16"></rect>
                <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
        </button>

        <button class="side-btn" id="reloadBtn" onclick="restartStream()" title="Reload">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
        </button>

    </div>

    <div class="volume-row">
        <span class="vol-tag">VOL</span>
        <input type="range" id="volSlider" min="0" max="100" value="80" oninput="setVolume(this.value)" style="--vp:80%">
        <span class="vol-tag" id="volNum">80</span>
    </div>

    <div class="footer-card">
        <div class="status-group">
            <span class="status-key">دۆخی پەخش</span>
            <span class="status-val" id="statusText">ئامادەیە بۆ لێدان</span>
        </div>
        <span class="badge">320 KBPS</span>
    </div>

</div>

<audio id="audioEl" preload="none" style="display:none;"></audio>

<script>
(function () {
    'use strict';

    // 🛠️ لێرەدا بەستەرەکەم گۆڕی بۆ HTTPS بەبێ بەکارهێنانی هیچ پڕۆکسییەک بۆ ئەوەی ڕاستەوخۆ لۆد بێت
    const STREAM_URL = 'https://uk17freenew.listen2myradio.com:23549/live/radiospihawler2025/m3u8';

    let hls         = null;
    let isPlaying   = false;
    let isMuted     = false;

    const audioEl   = document.getElementById('audioEl');
    const shell     = document.getElementById('shell');
    const statusEl  = document.getElementById('statusText');

    function setStatus(msg) { statusEl.textContent = msg; }

    function onPlaying() {
        isPlaying = true;
        shell.classList.add('is-playing');
        document.getElementById('ico-play').style.display  = 'none';
        document.getElementById('ico-pause').style.display = 'block';
        setStatus('ئێستا پەخش دەکرێت ڕاستەوخۆ');
    }

    function onPaused() {
        isPlaying = false;
        shell.classList.remove('is-playing');
        document.getElementById('ico-play').style.display  = 'block';
        document.getElementById('ico-pause').style.display = 'none';
        setStatus('ڕاگیراوە');
    }

    function destroyHLS() {
        if (hls) {
            try { hls.destroy(); } catch(e) {}
            hls = null;
        }
    }

    function startStream() {
        setStatus('پەیوەندی دەبەسترێت...');
        destroyHLS();
        audioEl.pause();
        audioEl.removeAttribute('src');

        if (typeof Hls !== 'undefined' && Hls.isSupported()) {
            hls = new Hls({
                lowLatencyMode: true,
                maxBufferLength: 6,
                backBufferLength: 0,
                enableWorker: true
            });

            hls.loadSource(STREAM_URL);
            hls.attachMedia(audioEl);

            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                audioEl.play()
                    .then(onPlaying)
                    .catch(function() {
                        setStatus('کرتە بکە بۆ لێدان');
                    });
            });

            hls.on(Hls.Events.ERROR, function(e, data) {
                if (data.fatal) {
                    setStatus('کێشە لە پەیوەندی هەیە، دووبارە تاقیکەرەوە');
                    onPaused();
                }
            });

        } else {
            // بۆ Safari و ئامێرەکانی iOS کە نەیتیڤ HLS دەخوێننەوە
            audioEl.src = STREAM_URL;
            audioEl.load();
            audioEl.play()
                .then(onPlaying)
                .catch(function() {
                    setStatus('براوزەرەکەت پەخشەکە ناخوێنێتەوە');
                    onPaused();
                });
        }
    }

    window.togglePlay = function() {
        if (!isPlaying) {
            startStream();
        } else {
            destroyHLS();
            audioEl.pause();
            onPaused();
        }
    };

    window.restartStream = function() {
        destroyHLS();
        audioEl.pause();
        onPaused();
        setTimeout(function() { startStream(); }, 300);
    };

    window.setVolume = function(val) {
        const v = parseInt(val);
        audioEl.volume = v / 100;
        document.getElementById('volNum').textContent = v;
        document.getElementById('volSlider').style.setProperty('--vp', v + '%');
        if (v === 0) { isMuted = true; applyMuteIcon(); }
        else         { isMuted = false; applyUnmuteIcon(); }
    };

    window.toggleMute = function() {
        const btn = document.getElementById('muteBtn');
        if (!isMuted) {
            isMuted = true;
            audioEl.volume = 0;
            const s = document.getElementById('volSlider');
            s.value = 0;
            s.style.setProperty('--vp', '0%');
            document.getElementById('volNum').textContent = '0';
            btn.classList.add('active');
            applyMuteIcon();
        } else {
            isMuted = false;
            audioEl.volume = 0.8;
            const s = document.getElementById('volSlider');
            s.value = 80;
            s.style.setProperty('--vp', '80%');
            document.getElementById('volNum').textContent = '80';
            btn.classList.remove('active');
            applyUnmuteIcon();
        }
    };

    function applyMuteIcon() {
        document.getElementById('ico-sound').style.display = 'none';
        document.getElementById('ico-mute').style.display  = 'block';
    }
    function applyUnmuteIcon() {
        document.getElementById('ico-sound').style.display = 'block';
        document.getElementById('ico-mute').style.display  = 'none';
    }

    audioEl.addEventListener('playing', onPlaying);
    audioEl.addEventListener('pause',   onPaused);
    audioEl.addEventListener('waiting', function() { setStatus('بارکردن...'); });
    audioEl.addEventListener('stalled', function() { setStatus('پەیوەندی سست...'); });

    audioEl.volume = 0.8;

})();
</script>
</body>
</html>
