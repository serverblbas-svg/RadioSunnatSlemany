<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Spi Hawler - ڕادیۆی سپی هەولێر</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --kurd-red: #da251d;
            --kurd-yellow: #ffcc00;
            --kurd-green: #009639;
            --dark-bg: #0f0f1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Noto Sans Arabic', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.05);
            animation: float 25s linear infinite;
            bottom: -150px;
            border-radius: 50%;
        }

        .bg-animation span:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; background: rgba(218, 37, 29, 0.1); }
        .bg-animation span:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; background: rgba(255, 204, 0, 0.1); }
        .bg-animation span:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; background: rgba(0, 150, 57, 0.1); }
        .bg-animation span:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; background: rgba(218, 37, 29, 0.08); }
        .bg-animation span:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; background: rgba(255, 204, 0, 0.08); }
        .bg-animation span:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; background: rgba(0, 150, 57, 0.06); }
        .bg-animation span:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; background: rgba(218, 37, 29, 0.05); }
        .bg-animation span:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; background: rgba(255, 204, 0, 0.07); }
        .bg-animation span:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; background: rgba(0, 150, 57, 0.08); }
        .bg-animation span:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; background: rgba(218, 37, 29, 0.05); }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* Main Container */
        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid var(--glass);
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 100px rgba(218, 37, 29, 0.1);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, var(--kurd-red), transparent 30%);
            animation: rotate 4s linear infinite;
            opacity: 0.1;
            z-index: -1;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--kurd-red), var(--kurd-yellow), var(--kurd-green));
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 10px 30px rgba(218, 37, 29, 0.4);
            animation: pulse 2s ease-in-out infinite;
            position: relative;
        }

        .logo-circle::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--kurd-yellow);
            border-bottom-color: var(--kurd-green);
            animation: spin 3s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2.2em;
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--kurd-yellow), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 1.1em;
            font-weight: 400;
        }

        /* Visualizer */
        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 60px;
            gap: 4px;
            margin: 25px 0;
            opacity: 0;
            transition: opacity 0.5s;
        }

        .visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 6px;
            background: linear-gradient(to top, var(--kurd-red), var(--kurd-yellow), var(--kurd-green));
            border-radius: 3px;
            animation: equalizer 1s ease-in-out infinite;
        }

        .bar:nth-child(1) { height: 20%; animation-delay: 0.0s; }
        .bar:nth-child(2) { height: 40%; animation-delay: 0.1s; }
        .bar:nth-child(3) { height: 60%; animation-delay: 0.2s; }
        .bar:nth-child(4) { height: 30%; animation-delay: 0.3s; }
        .bar:nth-child(5) { height: 50%; animation-delay: 0.4s; }
        .bar:nth-child(6) { height: 70%; animation-delay: 0.5s; }
        .bar:nth-child(7) { height: 35%; animation-delay: 0.6s; }
        .bar:nth-child(8) { height: 55%; animation-delay: 0.7s; }
        .bar:nth-child(9) { height: 25%; animation-delay: 0.8s; }
        .bar:nth-child(10) { height: 45%; animation-delay: 0.9s; }
        .bar:nth-child(11) { height: 65%; animation-delay: 1.0s; }
        .bar:nth-child(12) { height: 40%; animation-delay: 1.1s; }
        .bar:nth-child(13) { height: 50%; animation-delay: 1.2s; }
        .bar:nth-child(14) { height: 30%; animation-delay: 1.3s; }
        .bar:nth-child(15) { height: 60%; animation-delay: 1.4s; }

        @keyframes equalizer {
            0%, 100% { transform: scaleY(0.5); }
            50% { transform: scaleY(1); }
        }

        /* Player Controls */
        .player-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 25px 0;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--kurd-red), var(--kurd-yellow));
            color: #fff;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(218, 37, 29, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(218, 37, 29, 0.6);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .play-btn::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid var(--kurd-green);
            animation: ripple 2s linear infinite;
            opacity: 0;
        }

        .play-btn.playing::before {
            opacity: 1;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .vol-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid var(--glass);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .vol-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.1);
        }

        /* Volume Slider */
        .volume-container {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .volume-slider {
            width: 150px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--kurd-yellow), var(--kurd-green));
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        /* Clock Section */
        .clock-section {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 25px;
            margin-top: 25px;
            border: 1px solid var(--glass);
        }

        .live-clock {
            font-size: 3.5em;
            font-weight: 900;
            text-align: center;
            font-family: 'Tajawal', monospace;
            background: linear-gradient(to right, #fff, var(--kurd-yellow), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .date-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .date-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .date-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateX(-5px);
        }

        .date-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1em;
        }

        .date-icon {
            font-size: 1.5em;
        }

        .date-value {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--kurd-yellow);
            direction: ltr;
            text-align: left;
        }

        .hijri { color: var(--kurd-green); }
        .gregorian { color: #fff; }
        .kurdish { color: var(--kurd-red); }

        /* Status */
        .status {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-weight: 700;
            transition: all 0.3s;
        }

        .status.ready { background: rgba(0, 150, 57, 0.2); color: var(--kurd-green); }
        .status.playing { background: rgba(255, 204, 0, 0.2); color: var(--kurd-yellow); }
        .status.error { background: rgba(218, 37, 29, 0.2); color: var(--kurd-red); }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 25px;
            color: rgba(255,255,255,0.4);
            font-size: 0.9em;
        }

        .footer span {
            color: var(--kurd-red);
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 25px 15px; }
            h1 { font-size: 1.6em; }
            .live-clock { font-size: 2.5em; }
            .logo-circle { width: 90px; height: 90px; font-size: 36px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Background Animation -->
    <div class="bg-animation">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-circle">📻</div>
            <h1>Radio Spi Hawler</h1>
            <div class="subtitle">ڕادیۆی سپی هەولێر</div>
        </div>

        <!-- Audio Visualizer -->
        <div class="visualizer" id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <!-- Player Controls -->
        <div class="player-controls">
            <button class="vol-btn" onclick="changeVolume(-0.1)" title="کەمکردنەوەی دەنگ">🔉</button>
            <button class="play-btn" id="playBtn" onclick="togglePlay()" title="پەخش/ڕاگرتن">
                <span id="playIcon">▶</span>
            </button>
            <button class="vol-btn" onclick="changeVolume(0.1)" title="بەرزکردنەوەی دەنگ">🔊</button>
        </div>

        <div class="volume-container">
            <span style="font-size: 0.9em; opacity: 0.7;">🔇</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
            <span style="font-size: 0.9em; opacity: 0.7;">🔊</span>
        </div>

        <!-- Status -->
        <div class="status ready" id="status">✅ ئامادەیە - پەخش بکە</div>

        <!-- Clock & Dates Section -->
        <div class="clock-section">
            <div class="live-clock" id="clock">00:00:00</div>

            <div class="date-grid">
                <div class="date-card">
                    <div class="date-label">
                        <span class="date-icon">🌙</span>
                        <span>ڕێکەتی هیجری</span>
                    </div>
                    <div class="date-value hijri" id="hijriDate">...</div>
                </div>

                <div class="date-card">
                    <div class="date-label">
                        <span class="date-icon">📅</span>
                        <span>ڕێکەتی میلادی</span>
                    </div>
                    <div class="date-value gregorian" id="gregorianDate">...</div>
                </div>

                <div class="date-card">
                    <div class="date-label">
                        <span class="date-icon">☀️</span>
                        <span>ڕێکەتی کوردی</span>
                    </div>
                    <div class="date-value kurdish" id="kurdishDate">...</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            بە دیزاینێکی جوان و سەرنجڕاکێش | <span>❤</span> هەولێر
        </div>
    </div>

    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <script>
        // Stream URL
        const STREAM_URL = 'https://media2.streambrothers.com:1936/8218/8218/chunklist_w1622172701.m3u8';

        let hls;
        let isPlaying = false;
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const visualizer = document.getElementById('visualizer');
        const status = document.getElementById('status');

        // Initialize HLS
        function initPlayer() {
            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backBufferLength: 90
                });
                hls.loadSource(STREAM_URL);
                hls.attachMedia(audio);

                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    console.log('Manifest loaded');
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        status.className = 'status error';
                        status.textContent = '❌ هەڵە لە پەیوەندی بە ڕادیۆکە';
                    }
                });
            } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
                audio.src = STREAM_URL;
            } else {
                status.className = 'status error';
                status.textContent = '❌ براوسەرەکەت پشتگیری ناکات';
            }
        }

        // Play/Pause
        function togglePlay() {
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    playIcon.textContent = '⏸';
                    playBtn.classList.add('playing');
                    visualizer.classList.add('active');
                    status.className = 'status playing';
                    status.textContent = '🔴 پەخش دەکات...';
                }).catch(e => {
                    status.className = 'status error';
                    status.textContent = '❌ ناتوانێت پەخش بکات';
                });
            } else {
                audio.pause();
                isPlaying = false;
                playIcon.textContent = '▶';
                playBtn.classList.remove('playing');
                visualizer.classList.remove('active');
                status.className = 'status ready';
                status.textContent = '⏹ ڕاگیرا - پەخش بکە';
            }
        }

        // Volume
        function setVolume(val) {
            audio.volume = val / 100;
        }

        function changeVolume(delta) {
            let newVol = audio.volume + delta;
            newVol = Math.max(0, Math.min(1, newVol));
            audio.volume = newVol;
            document.getElementById('volumeSlider').value = Math.round(newVol * 100);
        }

        // Clock & Dates
        function updateClock() {
            const now = new Date();

            // Live Clock
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

            // Gregorian Date
            const gregOptions = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const gregDate = now.toLocaleDateString('ku-TR', gregOptions);
            document.getElementById('gregorianDate').textContent = gregDate;

            // Hijri Date (approximate calculation)
            const hijriDate = gregToHijri(now);
            document.getElementById('hijriDate').textContent = hijriDate;

            // Kurdish Date (Gregorian in Kurdish format)
            const kurdDate = toKurdishDate(now);
            document.getElementById('kurdishDate').textContent = kurdDate;
        }

        // Approximate Hijri conversion
        function gregToHijri(date) {
            const gregYear = date.getFullYear();
            const gregMonth = date.getMonth();
            const gregDay = date.getDate();

            // Approximate formula (not 100% exact but close enough for display)
            let hijriYear = gregYear - 622;
            let hijriMonth = gregMonth + 1;
            let hijriDay = gregDay;

            // Adjust for Hijri being ~11 days shorter per year
            const dayOfYear = Math.floor((date - new Date(gregYear, 0, 0)) / 1000 / 60 / 60 / 24);
            const hijriDayOfYear = Math.floor(dayOfYear * 354.367 / 365.25);

            const hijriMonths = [
                'مۇحەرەم', 'سەفەر', 'ڕەبیعەلئەوwel', 'ڕەبیعەس-sani',
                'جومادەلئولا', 'جومادەس-sani', 'ڕەجەب', 'شەعبان',
                'ڕەمەزان', 'شەووال', 'زوقەدە', 'زولحەججە'
            ];

            const hijriMonthIndex = Math.floor(hijriDayOfYear / 29.5) % 12;
            hijriDay = Math.floor(hijriDayOfYear % 29.5) + 1;

            // More accurate approximation using known epoch
            const epoch = new Date(622, 6, 16); // Approximate Hijri epoch
            const diffTime = date.getTime() - epoch.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const hijriYearCalc = Math.floor(diffDays / 354.367) + 1;
            const yearDays = diffDays % 354.367;
            const hijriMonthCalc = Math.floor(yearDays / 29.5) % 12;
            const hijriDayCalc = Math.floor(yearDays % 29.5) + 1;

            return `${hijriDayCalc}ی ${hijriMonths[hijriMonthCalc]}ی ${hijriYearCalc}ی هەتاوی`;
        }

        // Kurdish Date Format
        function toKurdishDate(date) {
            const kurdishMonths = [
                'کانوونی دووەم', 'شوبات', 'ئادار', 'نیسان', 'ئایار', 'حوزەیران',
                'تەمموز', 'ئاب', 'ئەیلوول', 'تشرینی یەکەم', 'تشرینی دووەم', 'کانوونی یەکەم'
            ];

            const kurdishDays = [
                'یەکشەممە', 'دووشەممە', 'سێشەممە', 'چوارشەممە', 'پێنجشەممە', 'هەینی', 'شەممە'
            ];

            const dayName = kurdishDays[date.getDay()];
            const day = date.getDate();
            const month = kurdishMonths[date.getMonth()];
            const year = date.getFullYear();

            return `${dayName} ${day}ی ${month}ی ${year}`;
        }

        // Initialize
        initPlayer();
        updateClock();
        setInterval(updateClock, 1000);

        // Auto-start on spacebar
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
    </script>
</body>
</html>
